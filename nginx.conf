server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA fallback: any unknown path serves index.html
    # so client-side routing (if added later) keeps working.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|svg|ico|png)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
